---
layout: default
---

<div class="home">

  {% include main.html %}
  <div class="bg-black xl:px-56 lg:px-48 px-2 py-10 ">
    <p class="text-2xl text-white font-bold px-12 lg:px-4 xl:px-4 ">
        Blog posts
    </p>
    <div class="grid grid-cols-1 xl:grid-cols-3 lg:grid-cols-3 gap-x-4 px-12 xl:px-4 lg:px-4 mt-8 xl:mt-0 lg:mt-0">
      {% for post in site.posts limit:6 %}
        <div class=" bg-gray-900 p-4 rounded-lg mt-8">
          <p class="text-xs text-white font-bold ">
            {{ post.title | escape }}
          </p>
          <p class="text-gray-400 text-xs pt-3 ">
            {% assign date_format = site.minima.date_format | default: "%b %-d, %Y" %}
            <span class="post-meta">{{ post.date | date: date_format }}</span>
          </p>
        </div>
      {% endfor %}
    </div>
  </div>
</div>
