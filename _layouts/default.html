<!DOCTYPE html>
<html lang="{{ site.lang | default: "en-US" }}">
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta charset="utf-8">
    <title>{{ site.title }}</title>
    <link rel="stylesheet" href="{{ "/assets/css/main.css" | relative_url }}">
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    {% include main-header.html %}
    <div class="mx-auto max-w-7xl px-4 sm:px-10 lg:px-20 xl:px-36">
      <div class="2xl:px-4 xl:px-2 mt-2">
        {% for collection in site.collections %}
          <a href="/fyle-for-admins/" class="flex mt-6  overflow-hidden border underline-mone transition ease-linear rounded-lg hover:border-primary-alpha-60 flex-col">
          <div class="flex grow flex-row flex-col gap-4 p-5 sm:flex-row sm:gap-5 sm:p-5" id="fyle-for-approvers">
              <div id="collection-icon-215891" class="flex items-center h-10 w-10 sm:h-[86px] sm:w-[86px] sm:justify-center justify-start" data-test-collection-photo="true">
                <div class="h-7 w-7 sm:h-10 sm:w-10"><img src="https://intercom.help/fyleapp/assets/svg/icon:book-bookmark/000000" alt="" width="100%" height="100%" loading="lazy">
                </div>
              </div>
              <div class="intercom-force-break flex w-full flex-1 flex-col text-lg justify-center">
                <div>
                  <h3 class="-mt-1 mb-0.5 line-clamp-2 text-md font-semibold leading-normal text-body-primary-color transition ease-linear group-hover/collection-summary:text-primary sm:line-clamp-1" data-testid="collection-name">{{collection.title}}</h3>
                  <p class="mb-0 mt-0 line-clamp-3 text-md sm:line-clamp-1">{{collection.description}}</p>
                </div>
                <div class="mt-3"><div class="flex gap-2">
                  <div class="flex flex-row">
                    <div class="flex shrink-0 flex-col items-center justify-center rounded-full leading-normal sm:flex-row" data-testid="avatars">
                      {% for contributer in collection.contributers %}

                      <img width="24" height="24" src="{{contributer.image}}" alt="Jahaber Sathik avatar" class="inline-flex items-center justify-center rounded-full bg-primary text-lg font-bold leading-6 text-primary-text shadow-solid-2 shadow-body-bg [&amp;:nth-child(n+2)]:hidden lg:[&amp;:nth-child(n+2)]:inline-flex h-6 w-6 z-4">
                      {% endfor %}
                    </div>
                  </div>
                  <span class="line-clamp-1 flex flex-wrap items-center text-base text-body-secondary-color">
                    <span class="hidden sm:inline">By Jahaber and 4 others</span><span class="inline sm:hidden">5 authors</span>
                    <svg width="4" height="4" viewBox="0 0 16 16" xmlns="http://www.w3.org/2000/svg" fill="currentColor" class="m-2"><path d="M15 8C15 4.13401 11.866 1 8 1C4.13401 1 1 4.13401 1 8C1 11.866 4.13401 15 8 15C11.866 15 15 11.866 15 8Z"></path></svg>
                    {{collection.articles}} articles
                  </span>
                </div>
              </div>
            </div>
          </div>
          </a>
        {% endfor %}
      </div>
    </div>
  </body>
</html>
